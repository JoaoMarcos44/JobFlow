<div class="welcome">
  <div class="welcome__orb welcome__orb--a" aria-hidden="true"></div>
  <div class="welcome__orb welcome__orb--b" aria-hidden="true"></div>

  <div class="welcome__inner">
    <div class="welcome__line" aria-hidden="true"></div>

    <p class="welcome__badge">Bem-vindo</p>

    <h1 class="welcome__title">
      <span class="welcome__title-word">Job</span>
      <span class="welcome__title-word welcome__title-word--accent">Flow</span>
    </h1>

    <p class="welcome__lead">
      Organize candidaturas, acompanha o feed e acelera a tua procura — tudo num só sítio.
    </p>

    <div class="welcome__actions">
      <button type="button" class="welcome__btn welcome__btn--primary" (click)="goToLogin()">
        Entrar
      </button>
      <a routerLink="/login" class="welcome__btn welcome__btn--ghost">Saltar animação</a>
    </div>
  </div>
</div>
