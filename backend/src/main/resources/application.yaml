# Configuração para desenvolvimento local.
# Projeto público (universidade): não coloque aqui dados reais de produção.
# Segredos e overrides locais recomendados: variáveis de ambiente — ver backend/env.example
#
server:
  port: ${SERVER_PORT:8080}

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/jobflow}
    username: ${SPRING_DATASOURCE_USERNAME:jobflow}
    password: ${SPRING_DATASOURCE_PASSWORD:jobflow}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

jobflow:
  ai:
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      model: ${OLLAMA_MODEL:llama3.2:3b}
      timeout-seconds: ${OLLAMA_TIMEOUT_SECONDS:120}
      enabled: ${OLLAMA_ENABLED:true}

app:
  jwt:
    secret: ${JWT_SECRET:jobflow-uni-public-demo-only-minimum-256-bit-hmac-placeholder!!}
    issuer: ${JOBFLOW_JWT_ISSUER:jobflow}
    ttlMinutes: ${JOBFLOW_JWT_TTL_MINUTES:60}
  dev:
    seedAdmin: ${JOBFLOW_DEV_SEED_ADMIN:true}
    adminEmail: ${JOBFLOW_DEV_ADMIN_EMAIL:admin@jobflow.com}
    adminPassword: ${JOBFLOW_DEV_ADMIN_PASSWORD:admin12}
    resetAdminPassword: ${JOBFLOW_DEV_RESET_ADMIN_PASSWORD:true}
