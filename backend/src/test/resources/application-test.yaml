# Base de dados em memória — mvn test sem PostgreSQL local.
spring:
  datasource:
    url: jdbc:h2:mem:jobflowtest;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    show-sql: false

app:
  jwt:
    secret: "test-secret-key-at-least-32-chars-long!!"
    issuer: "jobflow-test"
    ttlMinutes: 60
