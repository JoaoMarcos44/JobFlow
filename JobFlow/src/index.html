<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobFlow - Login</title>
    <!-- Importação de fonte moderna -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        /* Reset básico */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        /* Variáveis de Cores (Tema Dark/Tech) */
        :root {
            --bg-color: #020617; /* slate-950 */
            --card-bg: #0f172a; /* slate-900 */
            --primary-color: #06b6d4; /* cyan-500 */
            --primary-hover: #0891b2; /* cyan-600 */
            --text-main: #f8fafc; /* slate-50 */
            --text-muted: #94a3b8; /* slate-400 */
            --border-color: #1e293b; /* slate-800 */
            --error-color: #ef4444; /* red-500 */
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* Efeito de fundo subtil */
            background-image: radial-gradient(circle at top left, rgba(6, 182, 212, 0.05), transparent 40%),
                              radial-gradient(circle at bottom right, rgba(79, 70, 229, 0.05), transparent 40%);
        }

        .login-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 48px 40px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }

        /* Linha brilhante no topo do card */
        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--primary-color), transparent);
        }

        .brand {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-icon {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, var(--primary-color), #4f46e5);
            border-radius: 16px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 20px -5px rgba(6, 182, 212, 0.4);
        }

        /* Ícone SVG genérico para logo */
        .logo-icon svg {
            width: 32px;
            height: 32px;
            color: white;
        }

        .brand h1 {
            font-size: 32px;
            font-weight: 900;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
            background: linear-gradient(to right, #fff, var(--primary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .brand p {
            color: var(--text-muted);
            font-size: 15px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background-color: rgba(2, 6, 23, 0.5);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-main);
            font-size: 15px;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(6, 182, 212, 0.15);
        }

        .form-group input.is-invalid {
            border-color: var(--error-color);
        }

        .error-message {
            color: var(--error-color);
            font-size: 12px;
            margin-top: 8px;
            display: none;
        }

        .options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            font-size: 14px;
        }

        .checkbox-container {
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            user-select: none;
        }

        .checkbox-container input[type="checkbox"] {
            accent-color: var(--primary-color);
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .forgot-password {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .forgot-password:hover {
            color: #fff;
        }

        .btn-primary {
            width: 100%;
            padding: 16px;
            background-color: var(--primary-color);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .btn-primary:hover:not(:disabled) {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 10px 20px -5px rgba(6, 182, 212, 0.4);
        }

        .btn-primary:active:not(:disabled) {
            transform: translateY(1px);
        }

        .btn-primary:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        /* Spinner de carregamento */
        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .register-prompt {
            text-align: center;
            margin-top: 32px;
            color: var(--text-muted);
            font-size: 15px;
            padding-top: 24px;
            border-top: 1px solid var(--border-color);
        }

        .register-prompt a {
            color: var(--text-main);
            text-decoration: none;
            font-weight: 600;
            margin-left: 4px;
            transition: color 0.2s;
        }

        .register-prompt a:hover {
            color: var(--primary-color);
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="brand">
            <div class="logo-icon">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="12" y1="8" x2="12" y2="12"></line>
                    <line x1="12" y1="16" x2="12.01" y2="16"></line>
                </svg>
            </div>
            <h1>JobFlow</h1>
            <p>O seu funil de carreiras inteligente.</p>
        </div>

        <form id="loginForm" onsubmit="handleLogin(event)">

            <div class="form-group">
                <label for="email">E-mail Corporativo</label>
                <input type="email" id="email" placeholder="dev@exemplo.com" required>
                <div class="error-message" id="emailError">Insira um e-mail válido.</div>
            </div>

            <div class="form-group">
                <label for="password">Palavra-passe</label>
                <input type="password" id="password" placeholder="••••••••" required minlength="6">
                <div class="error-message" id="passwordError">A palavra-passe deve ter pelo menos 6 caracteres.</div>
            </div>

            <div class="options">
                <label class="checkbox-container">
                    <input type="checkbox" id="remember"> Manter sessão iniciada
                </label>
                <a href="#" class="forgot-password">Esqueceu a senha?</a>
            </div>

            <button type="submit" class="btn-primary" id="submitBtn">
                <span id="btnText">Entrar na Plataforma</span>
                <span class="spinner" id="btnSpinner"></span>
            </button>

        </form>

        <div class="register-prompt">
            Ainda não tem conta? <a href="#">Criar conta grátis</a>
        </div>
    </div>

    <script>
        function handleLogin(event) {
            // Previne o recarregamento da página (comportamento padrão do form)
            event.preventDefault();

            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');
            const submitBtn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const btnSpinner = document.getElementById('btnSpinner');

            // Lógica de validação básica
            let isValid = true;

            if (!emailInput.value.includes('@')) {
                emailInput.classList.add('is-invalid');
                document.getElementById('emailError').style.display = 'block';
                isValid = false;
            } else {
                emailInput.classList.remove('is-invalid');
                document.getElementById('emailError').style.display = 'none';
            }

            if (passwordInput.value.length < 6) {
                passwordInput.classList.add('is-invalid');
                document.getElementById('passwordError').style.display = 'block';
                isValid = false;
            } else {
                passwordInput.classList.remove('is-invalid');
                document.getElementById('passwordError').style.display = 'none';
            }

            // Se for válido, simula a chamada à API
            if (isValid) {
                // Estado de carregamento
                submitBtn.disabled = true;
                btnText.style.display = 'none';
                btnSpinner.style.display = 'block';

                // Simula o tempo de resposta do servidor (Spring Boot)
                setTimeout(() => {
                    // Restaura o botão
                    submitBtn.disabled = false;
                    btnText.style.display = 'block';
                    btnSpinner.style.display = 'none';

                    // Mostra uma mensagem na tela (já que não podemos usar alert no iframe)
                    showMessage('Login efetuado com sucesso! Redirecionando para o Dashboard...', 'success');

                    // Limpa o formulário
                    document.getElementById('loginForm').reset();
                }, 2000);
            }
        }

        // Função auxiliar para mostrar mensagens sem usar 'alert()'
        function showMessage(msg, type) {
            const messageDiv = document.createElement('div');
            messageDiv.textContent = msg;
            messageDiv.style.position = 'fixed';
            messageDiv.style.top = '20px';
            messageDiv.style.right = '20px';
            messageDiv.style.padding = '16px 24px';
            messageDiv.style.backgroundColor = type === 'success' ? 'var(--primary-color)' : 'var(--error-color)';
            messageDiv.style.color = 'white';
            messageDiv.style.borderRadius = '8px';
            messageDiv.style.boxShadow = '0 4px 12px rgba(0,0,0,0.15)';
            messageDiv.style.fontWeight = '500';
            messageDiv.style.zIndex = '1000';
            messageDiv.style.transition = 'opacity 0.3s ease';

            document.body.appendChild(messageDiv);

            // Remove a mensagem após 3 segundos
            setTimeout(() => {
                messageDiv.style.opacity = '0';
                setTimeout(() => {
                    document.body.removeChild(messageDiv);
                }, 300);
            }, 3000);
        }

        // Limpa validação ao digitar
        document.getElementById('email').addEventListener('input', function() {
            this.classList.remove('is-invalid');
            document.getElementById('emailError').style.display = 'none';
        });

        document.getElementById('password').addEventListener('input', function() {
            this.classList.remove('is-invalid');
            document.getElementById('passwordError').style.display = 'none';
        });
    </script>
</body>
</html>
